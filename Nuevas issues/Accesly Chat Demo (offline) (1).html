document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t here and you pay in one tap, without leaving the chat. 👇',\n    aiBalanceLabel:'AI balance', salesLabel:'Sales',\n    aiPanelTitle:'AI balance', aiPanelDesc:'Keeps your assistant answering', aiCost:'~$0.02 per reply', recharge:'Top up',\n    toolConnected:'Connected', toolInstr:'When and how to use it', toolOff:'Disabled',\n    salesPanelTitle:'Business sales', withdraw:'Withdraw', assistantLabel:'AI assistant',\n    bizTitle:'How is your business?', bizDesc:'Ask your assistant', bizPlaceholder:'Ask about your business…',\n    bizPreset1:'Give me my sales report', bizPreset2:'How is this month going?', bizPreset3:'What is my best-selling service?',\n    chargeTypesLabel:'Charge types', salesStatsTpl:'{n} charges · avg {avg}', salesStatsZero:'No sales yet',\n    toolsMeta:{\n      payments:{ name:'Accesly Payments', connected:'+52 55 1234 5678', extra:'' },\n      calendar:{ name:'Google Calendar', connected:\"Ana's calendar\", extra:'Confirm by message before booking' },\n      gmail:{ name:'Gmail', connected:'ana@nutriana.com', extra:'Send an email summary after each session' },\n      sheets:{ name:'Google Sheets', connected:'Sheet · Clients 2026', extra:'Log every sale automatically' },\n      drive:{ name:'Google Drive', connected:\"Ana's Drive\", extra:'Share plan photos and files with the customer' }\n    },\n    chargeMeta:{\n      payg:{ name:'Pay-as-you-go', desc:'Charge per use' },\n      subscription:{ name:'Subscription', desc:'Recurring charge' },\n      product:{ name:'Product', desc:'Sell products' },\n      service:{ name:'Service', desc:'Sessions & consults' },\n      donation:{ name:'Donation', desc:'Voluntary tips' }\n    }\n  }\n};\n\nconst AGENT_DEFAULT = 'Eres el asistente virtual de Nutri Ana, nutricionista. Respondes dudas de clientes sobre planes de nutrición, precios y horarios de forma breve, cálida y profesional. Si preguntan por una consulta, invítalos a agendar una sesión de 60 min ($30).';\nconst TOOL_ORDER = ['payments', 'calendar', 'gmail', 'sheets', 'drive'];\nconst TOOL_ICON = { payments:'💳', calendar:'📅', gmail:'✉️', sheets:'📊', drive:'📁' };\nconst CHARGE_ORDER = ['payg', 'subscription', 'product', 'service', 'donation'];\nconst CHARGE_ICON = { payg:'⚡', subscription:'🔁', product:'📦', service:'🥗', donation:'💚' };\n\nconst KIND = {\n  service:{ amount:30, glyph:'🥗', icon:'#e6f5ee', payable:true, auto:false },\n  sub:    { amount:9,  glyph:'🔁', icon:'#eef1ee', payable:true, auto:true },\n  payg:   { amount:1.5,glyph:'🤖', icon:'#eef1ee', payable:false, auto:true, ai:true },\n  tip:    { amount:5,  glyph:'💚', icon:'#eef1ee', payable:true, auto:false }\n};\n\nclass Component extends DCLogic {\n  state = {\n    view:'business', lang:'es', onboarded:false, sheet:null, typing:false,\n    activePay:null, displayBalance:0, balanceTarget:0,\n    agentPrompt: AGENT_DEFAULT, agentActive:true,\n    tools:{\n      payments:{ enabled:true, prompt:'Envía el cobro cuando el cliente confirme una sesión o pregunte cómo pagar.', types:{ payg:true, subscription:true, product:true, service:true, donation:true } },\n      calendar:{ enabled:true, extra:true, prompt:'Agenda sesiones de 60 min en los horarios libres de Ana y confirma por mensaje.' },\n      gmail:{ enabled:true, extra:true, prompt:'Envía un correo de seguimiento con el plan después de cada sesión.' },\n      sheets:{ enabled:true, extra:true, prompt:'Registra cada venta y nuevo cliente en la hoja.' },\n      drive:{ enabled:true, extra:true, prompt:'Comparte fotos del plan y archivos PDF con el cliente cuando los pida.' }\n    },\n    tone:'warm', length:'normal', aiBalance:5, toolDetail:null, askedPay:false,\n    bizQuestion:'', bizAsked:'', bizAnswer:'', bizLoading:false,\n    testQuestion:'', askedQuestion:'', testAnswer:'', testLoading:false, testPaymentSent:false,\n    messages:[ { id:'m1', type:'text', author:'ana', key:'greeting', time:'9:40' } ]\n  };\n\n  componentDidMount(){ this._fit = () => this.fitPhone(); window.addEventListener('resize', this._fit); this.fitPhone(); }\n  fitPhone(){ if(!this._scaler) return; const pad = 150; const s = Math.min(1, (window.innerHeight - pad) / 812, (window.innerWidth - 32) / 384); this._scaler.style.zoom = s.toFixed(3); }\n  componentWillUnmount(){ clearInterval(this._bi); window.removeEventListener('resize', this._fit); }\n  componentDidUpdate(){ if(this._body){ this._body.scrollTop = this._body.scrollHeight; } }\n\n  fmt(n){ return '$' + Number(n).toFixed(2); }\n\n  setView(v){ return () => this.setState({ view:v, sheet:null }); }\n  setLang(l){ return () => this.setState({ lang:l }); }\n\n  startCollecting(){\n    this.setState({ sheet:'bioOnboard' });\n    setTimeout(() => this.setState({ onboarded:true, sheet:'ready' }), 1700);\n  }\n  closeReady(){ this.setState({ sheet:null }); }\n  openCompose(){ this.setState({ sheet:'compose' }); }\n  closeSheet(){ this.setState({ sheet:null }); }\n\n  pushPayment(kind, opts){\n    opts = opts || {};\n    const id = 'pay_' + kind + '_' + Date.now();\n    const meta = KIND[kind];\n    this.setState(s => ({ sheet: opts.keepSheet ? s.sheet : null, typing:true }));\n    setTimeout(() => {\n      this.setState(s => ({ typing:false, messages:[ ...s.messages, { id, type:'payment', kind, author: meta.ai ? 'ai' : 'ana', amount: meta.amount, status:'pending', time: this.nowTime() } ] }));\n      if (meta.auto) setTimeout(() => this.markPaid(id), 1200);\n    }, 750);\n  }\n  nowTime(){ return '9:4' + (3 + Math.min(6, this.state.messages.length)); }\n\n  sendService(){ this.pushPayment('service'); }\n  sendSubscription(){ this.pushPayment('sub'); }\n  sendPayg(){ this.pushPayment('payg'); }\n  sendTip(){ this.pushPayment('tip'); }\n\n  payNow(id){ return () => this.setState({ sheet:'confirm', activePay:id }); }\n  confirmPay(){\n    this.setState({ sheet:'bioPay' });\n    setTimeout(() => { this.markPaid(this.state.activePay); this.setState({ sheet:null, activePay:null }); }, 1700);\n  }\n\n  markPaid(id){\n    let added = 0;\n    this.setState(s => {\n      const messages = s.messages.map(m => { if (m.id === id && m.status !== 'paid'){ added = m.amount; return { ...m, status:'paid' }; } return m; });\n      return { messages, balanceTarget: s.balanceTarget + added };\n    }, () => this.animateBalance());\n  }\n\n  animateBalance(){\n    clearInterval(this._bi);\n    const start = this.state.displayBalance;\n    const end = this.state.balanceTarget;\n    const t0 = Date.now(); const dur = 750;\n    this._bi = setInterval(() => {\n      const k = Math.min(1, (Date.now() - t0) / dur);\n      const e = 1 - Math.pow(1 - k, 3);\n      this.setState({ displayBalance: start + (end - start) * e });\n      if (k >= 1) clearInterval(this._bi);\n    }, 28);\n  }\n\n  openClose(){ this.setState({ sheet:'close' }); }\n  openDashboard(){ this.setState({ sheet:'dashboard' }); }\n\n  toggleToolEnabled(key){ this.setState(st => ({ tools: { ...st.tools, [key]: { ...st.tools[key], enabled: !st.tools[key].enabled } } })); }\n  toggleToolExtra(key){ this.setState(st => ({ tools: { ...st.tools, [key]: { ...st.tools[key], extra: !st.tools[key].extra } } })); }\n  setToolPrompt(key, v){ this.setState(st => ({ tools: { ...st.tools, [key]: { ...st.tools[key], prompt: v } } })); }\n  openTool(key){ this.setState({ toolDetail:key }); }\n  closeTool(){ this.setState({ toolDetail:null }); }\n  setTone(t){ this.setState({ tone:t }); }\n  setLength(l){ this.setState({ length:l }); }\n  consumeAi(){ this.setState(st => ({ aiBalance: Math.max(0, Math.round((st.aiBalance - 0.02) * 100) / 100) })); }\n  rechargeAi(){ this.setState(st => ({ aiBalance: Math.round((st.aiBalance + 5) * 100) / 100 })); }\n  toggleChargeType(ck){ this.setState(st => ({ tools: { ...st.tools, payments: { ...st.tools.payments, types: { ...st.tools.payments.types, [ck]: !st.tools.payments.types[ck] } } } })); }\n  withdraw(){ this.setState({ balanceTarget:0 }, () => this.animateBalance()); }\n  bizPreset(t){ this.runBizReport(t); }\n  runBizReport(q){\n    const question = ((q !== undefined && q !== null) ? q : this.state.bizQuestion).trim();\n    if (!question) return;\n    this.setState({ bizLoading:true, bizAnswer:'', bizAsked:question, bizQuestion:'' });\n    this.consumeAi();\n    const s = this.state; const es = s.lang === 'es';\n    const paid = s.messages.filter(m => m.type === 'payment' && m.status === 'paid');\n    const count = paid.length; const total = s.balanceTarget; const avg = count ? total / count : 0;\n    const finish = (a) => this.setState({ bizAnswer:a, bizLoading:false });\n    const prompt = 'Eres el asistente de negocio de Nutri Ana (nutricionista). Datos reales actuales: ventas totales ' + this.fmt(total) + ', ' + count + ' cobros pagados, ticket promedio ' + this.fmt(avg) + '. Servicios: sesión 60 min ($30), plan mensual ($9/mes), asistente IA ($1.50). '\n      + (es ? 'Responde en español, breve y concreto, con cifras, como un reporte de chat (máximo 3 frases).' : 'Reply in English, brief and concrete, with figures, like a chat report (max 3 sentences).')\n      + '\\n\\nPregunta: \"' + question + '\"';\n    if (window.claude && typeof window.claude.complete === 'function'){\n      window.claude.complete(prompt).then(r => { const t = (r || '').trim(); finish(t || this.bizFallback(count, total, avg)); }).catch(() => setTimeout(() => finish(this.bizFallback(count, total, avg)), 600));\n    } else { setTimeout(() => finish(this.bizFallback(count, total, avg)), 850); }\n  }\n  bizFallback(count, total, avg){\n    const es = this.state.lang === 'es';\n    if (!count) return es ? 'Aún no tienes ventas registradas. En cuanto cobres, aquí verás tu resumen al instante. 📊' : 'No sales yet. As soon as you charge, your summary shows up here instantly. 📊';\n    return es ? ('Llevas ' + this.fmt(total) + ' en ' + count + ' cobros, con un ticket promedio de ' + this.fmt(avg) + '. Tu sesión de 60 min es lo más vendido. Vas en buen ritmo 📈')\n              : ('You have ' + this.fmt(total) + ' across ' + count + ' charges, average ticket ' + this.fmt(avg) + '. Your 60-min session is the top seller. Nice momentum 📈');\n  }\n  customerAsk(){\n    if (this.state.askedPay) return;\n    this.setState(s => ({ askedPay:true, messages:[ ...s.messages, { id:'q_'+Date.now(), type:'text', author:'carlos', key:'preset4', time:this.nowTime() } ] }));\n    this.consumeAi();\n    setTimeout(() => {\n      this.setState({ typing:true });\n      setTimeout(() => {\n        this.setState(s => ({ typing:false, messages:[ ...s.messages, { id:'a_'+Date.now(), type:'text', author:'ana', key:'payLead', time:this.nowTime() } ] }));\n        if (this.state.tools.payments.enabled && this.state.tools.payments.types.service){\n          setTimeout(() => this.pushPayment('service', { keepSheet:true }), 650);\n        }\n      }, 1000);\n    }, 500);\n  }\n  tgl(on){ return {\n    track: 'width:44px; height:26px; border-radius:999px; position:relative; cursor:pointer; transition:.18s; flex:none; background:' + (on ? '#1fae7c' : '#cfd6cd') + ';',\n    knob: 'position:absolute; top:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.2); transition:.18s; left:' + (on ? '21px' : '3px') + ';'\n  }; }\n  paymentIntent(q){\n    const lq = (q || '').toLowerCase();\n    return /forma de pago|m[eé]todo de pago|c[oó]mo (ser[ií]a|funciona|hago|es|se hace|se realiza).{0,16}(pag|cobr)|c[oó]mo (te |le |se )?pag|d[oó]nde pag|puedo pagar|how (would|do|can|does).{0,18}(pay|payment)|how to pay|where.{0,8}pay|payment work/.test(lq);\n  }\n  buildPrompt(question){\n    const s = this.state; const es = s.lang === 'es';\n    const toneMap = es ? { warm:'cálido y cercano', pro:'profesional', direct:'directo y breve' } : { warm:'warm and friendly', pro:'professional', direct:'direct and brief' };\n    const lenMap = es ? { short:'una sola frase', normal:'máximo 2 frases', long:'máximo 4 frases' } : { short:'one sentence', normal:'max 2 sentences', long:'max 4 sentences' };\n    const meta = COPY[s.lang].toolsMeta;\n    const names = TOOL_ORDER.filter(k => s.tools[k].enabled).map(k => meta[k].name);\n    return s.agentPrompt\n      + '\\n\\n' + (es ? 'Herramientas conectadas: ' : 'Connected tools: ') + (names.join(', ') || (es ? 'ninguna' : 'none')) + '.'\n      + '\\n' + (es ? 'Tono: ' : 'Tone: ') + toneMap[s.tone] + '. ' + (es ? 'Longitud: ' : 'Length: ') + lenMap[s.length] + '.'\n      + '\\n' + (es ? 'Responde en español, como mensaje de chat. No digas que eres una IA.' : 'Reply in English, like a chat message. Do not say you are an AI.')\n      + '\\n\\n' + (es ? 'Pregunta del cliente: ' : 'Customer question: ') + '\"' + question + '\"';\n  }\n  presetQuestion(t){ this.runTest(t); }\n  runTest(q){\n    const question = ((q !== undefined && q !== null) ? q : this.state.testQuestion).trim();\n    if (!question) return;\n    this.setState({ testLoading:true, testAnswer:'', testPaymentSent:false, askedQuestion:question, testQuestion:'' });\n\n    // Auto-charge: when the customer asks how to pay and the agent has the tool enabled, it sends the service charge.\n    if (this.paymentIntent(question) && this.state.tools.payments.enabled && this.state.tools.payments.types.service){\n      setTimeout(() => {\n        this.setState({ testLoading:false, testPaymentSent:true, testAnswer: COPY[this.state.lang].payLead });\n        this.consumeAi();\n        this.pushPayment('service', { keepSheet:true });\n      }, 850);\n      return;\n    }\n\n    const finish = (ans) => { this.consumeAi(); this.setState({ testAnswer:ans, testLoading:false }); };\n    const prompt = this.buildPrompt(question);\n    if (window.claude && typeof window.claude.complete === 'function'){\n      window.claude.complete(prompt)\n        .then(r => { const t = (r || '').trim(); finish(t || this.fallbackAnswer(question)); })\n        .catch(() => setTimeout(() => finish(this.fallbackAnswer(question)), 600));\n    } else {\n      setTimeout(() => finish(this.fallbackAnswer(question)), 850);\n    }\n  }\n  fallbackAnswer(q){\n    const es = this.state.lang === 'es';\n    const lq = q.toLowerCase();\n    if (/vegan/.test(lq)) return es ? '¡Claro! Ana diseña planes 100% veganos según tus objetivos. ¿Agendamos una sesión de 60 min ($30) para armarlo juntos?' : 'Of course! Ana builds fully vegan plans around your goals. Shall we book a 60-min session ($30) to set it up?';\n    if (/cuesta|precio|cost|cuánt|cuant|how much|price/.test(lq)) return es ? 'La consulta de 60 min cuesta $30 e incluye tu plan personalizado. Puedo agendarte ahora mismo. 😊' : 'A 60-min consultation is $30 and includes your personalized plan. I can book you right now. 😊';\n    if (/domingo|sunday|horario|hours|abren|atienden|open|cuándo|cuando/.test(lq)) return es ? 'Atendemos de lunes a sábado, de 8am a 6pm. Los domingos respondemos mensajes pero no agendamos sesiones.' : 'We are open Monday to Saturday, 8am to 6pm. On Sundays we reply to messages but do not book sessions.';\n    if (/pag|pay|cobr/.test(lq)) return es ? 'Pagas con un toque aquí mismo en el chat, sin salir ni instalar nada. ¿Quieres que te envíe el cobro?' : 'You pay in one tap right here in the chat, without leaving or installing anything. Want me to send you the charge?';\n    return es ? '¡Con gusto te ayudo! Cuéntame un poco más sobre tu objetivo y te oriento. Si quieres, agendamos una sesión de 60 min ($30) con Ana.' : 'Happy to help! Tell me a bit more about your goal and I will guide you. If you like, we can book a 60-min session ($30) with Ana.';\n  }\n  reset(){\n    clearInterval(this._bi);\n    this.setState({ view:'business', onboarded:false, sheet:null, typing:false, activePay:null, displayBalance:0, balanceTarget:0, aiBalance:5, askedPay:false, toolDetail:null, bizQuestion:'', bizAsked:'', bizAnswer:'', bizLoading:false, testQuestion:'', askedQuestion:'', testAnswer:'', testLoading:false, testPaymentSent:false, messages:[ { id:'m1', type:'text', author:'ana', key:'greeting', time:'9:40' } ] });\n  }\n\n  pill(active){ return active\n    ? 'padding:7px 18px; border-radius:999px; font-size:13.5px; font-weight:600; cursor:pointer; background:#0e7c66; color:#fff; transition:all .15s;'\n    : 'padding:7px 18px; border-radius:999px; font-size:13.5px; font-weight:600; cursor:pointer; background:transparent; color:#6b766e; transition:all .15s;'; }\n  langPill(active){ return active\n    ? 'padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer; background:#0f1b16; color:#fff;'\n    : 'padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer; background:transparent; color:#9aa69d;'; }\n\n  renderVals(){\n    const s = this.state;\n    const c = COPY[s.lang];\n    const isCustomer = s.view === 'customer';\n    const isBusiness = s.view === 'business';\n\n    const rows = s.messages.map(m => {\n      const businessSide = m.author !== 'carlos';\n      const outgoing = isBusiness ? businessSide : !businessSide;\n      const rowStyle = { display:'flex', justifyContent: outgoing ? 'flex-end' : 'flex-start', animation:'acc-pop .26s cubic-bezier(.2,.8,.2,1) both' };\n\n      if (m.type === 'text'){\n        const bubbleStyle = {\n          maxWidth:'78%', padding:'8px 12px 7px', borderRadius: outgoing ? '14px 14px 4px 14px' : '14px 14px 14px 4px',\n          background: outgoing ? '#e4f3d4' : '#ffffff', boxShadow:'0 1px 1.5px rgba(15,27,22,.10)'\n        };\n        return { id:m.id, isText:true, isPayment:false, rowStyle, bubbleStyle, text: m.key ? c[m.key] : m.text, time:m.time };\n      }\n\n      const meta = KIND[m.kind];\n      const paid = m.status === 'paid';\n      const showPay = meta.payable && !paid && isCustomer;\n      const showPending = !paid && !showPay && !meta.ai ? isBusiness : (!paid && meta.ai ? false : false);\n      const bubbleStyle = { maxWidth:'84%', width:'270px' };\n      const iconStyle = { width:'38px', height:'38px', borderRadius:'11px', background: meta.icon, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'19px', flex:'none' };\n\n      let paidText = c.successCustomer;\n      if (paid){ paidText = meta.ai ? c.paidAi : (isBusiness ? c.paidBadge : c.successCustomer); }\n\n      return {\n        id:m.id, isText:false, isPayment:true, rowStyle, bubbleStyle, iconStyle, iconGlyph: meta.glyph,\n        payTitle: meta.ai ? c.aiTitle : c.reqFrom,\n        payDesc: c['desc' + m.kind.charAt(0).toUpperCase() + m.kind.slice(1)],\n        amountStr: this.fmt(meta.amount),\n        showPay, isPaid: paid, showPending,\n        paidText, time:m.time,\n        onPay: this.payNow(m.id)\n      };\n    });\n\n    const activeMsg = s.messages.find(m => m.id === s.activePay);\n    const activeAmt = activeMsg ? KIND[activeMsg.kind].amount : 0;\n\n    return {\n      c,\n      isCustomer, isBusiness,\n      headerSub: isCustomer ? c.headerSub_customer : c.headerSub_business,\n      rows, typing: s.typing,\n      custBtnStyle: this.pill(isCustomer), bizBtnStyle: this.pill(isBusiness),\n      esStyle: this.langPill(s.lang === 'es'), enStyle: this.langPill(s.lang === 'en'),\n      setViewCustomer: this.setView('customer'), setViewBusiness: this.setView('business'),\n      setLangEs: this.setLang('es'), setLangEn: this.setLang('en'),\n      showCustomerInput: isCustomer,\n      showBusinessInput: isBusiness && s.onboarded,\n      showOnboardCard: isBusiness && !s.onboarded && !s.sheet,\n      anyBio: s.sheet === 'bioOnboard' || s.sheet === 'bioPay',\n      bioTitle: s.sheet === 'bioPay' ? c.bioPayTitle : c.bioOnboardTitle,\n      sheetReady: s.sheet === 'ready',\n      sheetCompose: s.sheet === 'compose',\n      sheetConfirm: s.sheet === 'confirm',\n      sheetClose: s.sheet === 'close',\n      confirmAmount: this.fmt(activeAmt),\n      confirmText: c.confirmTextTpl.replace('{amt}', this.fmt(activeAmt)),\n      showBalances: isBusiness && s.onboarded && s.sheet !== 'close' && s.sheet !== 'dashboard',\n      balanceStr: this.fmt(s.displayBalance),\n      aiBalanceStr: this.fmt(s.aiBalance),\n      complete: isBusiness && s.balanceTarget >= 40.49 && s.sheet !== 'close' && s.sheet !== 'dashboard',\n      showHeaderGear: isBusiness && s.onboarded,\n      showHeaderCalls: !(isBusiness && s.onboarded),\n      showPaySuggestion: isCustomer && !s.askedPay,\n      customerAsk: () => this.customerAsk(),\n      sheetDashboard: s.sheet === 'dashboard',\n      openDashboard: () => this.openDashboard(),\n      rechargeAi: () => this.rechargeAi(),\n      withdraw: () => this.withdraw(),\n      salesStatsStr: (() => {\n        const paid = s.messages.filter(m => m.type === 'payment' && m.status === 'paid');\n        const n = paid.length; if (!n) return c.salesStatsZero;\n        return c.salesStatsTpl.replace('{n}', n).replace('{avg}', this.fmt(s.balanceTarget / n));\n      })(),\n      bizQuestion: s.bizQuestion,\n      setBizQuestion: (e) => this.setState({ bizQuestion: e.target.value }),\n      onBizKey: (e) => { if (e.key === 'Enter'){ e.preventDefault(); this.runBizReport(); } },\n      runBizBtn: () => this.runBizReport(),\n      bizLoading: s.bizLoading,\n      bizAnswer: s.bizAnswer,\n      bizAskedDisplay: s.bizAsked,\n      bizHasChat: s.bizLoading || !!s.bizAnswer,\n      bizShowAnswer: !s.bizLoading && !!s.bizAnswer,\n      bizPresets: [c.bizPreset1, c.bizPreset2, c.bizPreset3].map(t => ({ text:t, onClick: () => this.bizPreset(t) })),\n      agentPrompt: s.agentPrompt,\n      setAgentPrompt: (e) => this.setState({ agentPrompt: e.target.value }),\n      toggleAgent: () => this.setState(st => ({ agentActive: !st.agentActive })),\n      agentToggleStyle: this.tgl(s.agentActive).track,\n      agentKnobStyle: this.tgl(s.agentActive).knob,\n      toolRows: TOOL_ORDER.map((key, i) => {\n        const meta = c.toolsMeta[key]; const on = s.tools[key].enabled;\n        return { key, name: meta.name, icon: TOOL_ICON[key],\n          statusText: on ? meta.connected : c.toolOff,\n          dotStyle: 'width:8px; height:8px; border-radius:50%; flex:none; background:' + (on ? '#1fae7c' : '#cfd6cd') + ';',\n          onClick: () => this.openTool(key),\n          rowStyle: 'display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer;' + (i < TOOL_ORDER.length - 1 ? ' border-bottom:1px solid rgba(15,27,22,.05);' : '') };\n      }),\n      toneOptions: [['warm', c.toneWarm], ['pro', c.tonePro], ['direct', c.toneDirect]].map(([k, label]) => {\n        const active = s.tone === k;\n        return { label, onClick:() => this.setTone(k),\n          style: 'flex:1; text-align:center; padding:8px 4px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; transition:.15s; ' + (active ? 'background:#0f1b16; color:#fff; box-shadow:0 1px 3px rgba(0,0,0,.15);' : 'color:#6b766e;') };\n      }),\n      lengthOptions: [['short', c.lenShort], ['normal', c.lenNormal], ['long', c.lenLong]].map(([k, label]) => {\n        const active = s.length === k;\n        return { label, onClick:() => this.setLength(k),\n          style: 'flex:1; text-align:center; padding:8px 4px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; transition:.15s; ' + (active ? 'background:#0f1b16; color:#fff; box-shadow:0 1px 3px rgba(0,0,0,.15);' : 'color:#6b766e;') };\n      }),\n      sheetToolDetail: !!s.toolDetail,\n      toolDetail: (() => {\n        const key = s.toolDetail; if (!key) return {};\n        const meta = c.toolsMeta[key]; const tc = s.tools[key];\n        const et = this.tgl(tc.enabled); const isPayments = key === 'payments';\n        const base = { key, name: meta.name, icon: TOOL_ICON[key], connected: meta.connected, prompt: tc.prompt,\n          enabledToggleStyle: et.track, enabledKnobStyle: et.knob,\n          onToggleEnabled: () => this.toggleToolEnabled(key),\n          setPrompt: (e) => this.setToolPrompt(key, e.target.value),\n          isPayments, hasExtra: !isPayments };\n        if (isPayments){\n          base.chargeTypes = CHARGE_ORDER.map((ck, i) => {\n            const on = tc.types[ck]; const t = this.tgl(on); const cm = c.chargeMeta[ck];\n            return { name: cm.name, desc: cm.desc, icon: CHARGE_ICON[ck], toggleStyle:t.track, knobStyle:t.knob, onToggle:() => this.toggleChargeType(ck),\n              rowStyle:'display:flex; align-items:center; gap:12px; padding:12px 14px;' + (i < CHARGE_ORDER.length - 1 ? ' border-bottom:1px solid rgba(15,27,22,.05);' : '') };\n          });\n        } else {\n          const xt = this.tgl(tc.extra);\n          base.extraLabel = meta.extra; base.extraToggleStyle = xt.track; base.extraKnobStyle = xt.knob;\n          base.onToggleExtra = () => this.toggleToolExtra(key);\n        }\n        return base;\n      })(),\n      closeTool: () => this.closeTool(),\n      testPaymentSent: s.testPaymentSent,\n      testQuestion: s.testQuestion,\n      setTestQuestion: (e) => this.setState({ testQuestion: e.target.value }),\n      onTestKey: (e) => { if (e.key === 'Enter'){ e.preventDefault(); this.runTest(); } },\n      runTestBtn: () => this.runTest(),\n      testLoading: s.testLoading,\n      testAnswer: s.testAnswer,\n      testQuestionDisplay: s.askedQuestion,\n      hasTest: s.testLoading || !!s.testAnswer,\n      showAnswer: !s.testLoading && !!s.testAnswer,\n      presets: [c.preset1, c.preset2, c.preset3, c.preset4].map(t => ({ text:t, onClick: () => this.presetQuestion(t) })),\n      startCollecting: () => this.startCollecting(),\n      closeReady: () => this.closeReady(),\n      openCompose: () => this.openCompose(),\n      closeSheet: () => this.closeSheet(),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      sendService: () => this.sendService(),\n      sendSubscription: () => this.sendSubscription(),\n      sendPayg: () => this.sendPayg(),\n      sendTip: () => this.sendTip(),\n      confirmPay: () => this.confirmPay(),\n      openClose: () => this.openClose(),\n      reset: () => this.reset(),\n      bodyRef: (el) => { this._body = el; },\n      scaleRef: (el) => { this._scaler = el; if(el) this.fitPhone(); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
